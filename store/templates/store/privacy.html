{% extends 'store/base.html' %}

{% block extra_css %}
<style>
  .page-title {
    text-align: center;
    font-family: 'Courier New', monospace;
    font-size: 36px;
    margin: 30px 0 60px;
    text-transform: uppercase;
    letter-spacing: 2px;
    line-height: 1.2;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 40px;
  }

  .container p {
    font-family: 'Courier New', monospace;
    font-size: 20px;
    line-height: 1.8;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .container a {
    color: black;
    text-decoration: underline;
    word-break: break-word;
  }

  @media (max-width: 768px) {
    .page-title {
      font-size: 24px;
      margin: 20px 0 40px;
      letter-spacing: 1px;
      padding: 0 16px;
    }

    .container {
      padding: 0 24px;
    }

    .container p {
      font-size: 16px;
      line-height: 1.8;
    }
  }
</style>
{% endblock %}

{% block content %}

<h1 class="page-title">Privacy Policy</h1>

<div class="container">
  <p>
    IN ADDITION, YOU AGREE TO OUR MESSAGING TERMS
    (<a href="https://terms.pscr.pt/legal/shop/ab72c2-2/terms_of_service" target="_blank">
    TERMS OF SERVICE</a>)
    AND MESSAGING PRIVACY POLICY
    (<a href="https://terms.pscr.pt/legal/shop/ab72c2-2/privacy_policy" target="_blank">
    PRIVACY POLICY</a>).
  </p>
</div>

{% endblock %}
