{% extends 'store/base.html' %}

{% block title %}Track Order | SLICKBACK{% endblock %}

{% block extra_css %}
<style>
  .page-title {
    text-align: center;
    font-family: 'Courier New', monospace;
    font-size: 36px;
    margin: 30px 0 60px;
    text-transform: uppercase;
    letter-spacing: 2px;
    line-height: 1.2;
  }

  .tracking-page {
    max-width: 700px;
    margin: 0 auto 80px;
    padding: 0 40px;
    text-align: center;
  }

  .tracking-page p {
    font-family: 'Courier New', monospace;
    font-size: 18px;
    line-height: 1.9;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 35px;
  }

  .tracking-box {
    background: #fff;
    border: 1px solid #ddd;
    padding: 35px;
  }

  .tracking-box input {
    width: 100%;
    padding: 15px;
    border: 1px solid #bbb;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    margin-bottom: 18px;
    text-transform: uppercase;
  }

  .tracking-box button {
    width: 100%;
    padding: 15px;
    background: #000;
    color: #fff;
    border: none;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    cursor: pointer;
    text-transform: uppercase;
  }

  .tracking-box button:hover {
    opacity: 0.85;
  }

  @media (max-width: 768px) {
    .page-title {
      font-size: 24px;
      margin: 20px 0 40px;
      letter-spacing: 1px;
      padding: 0 16px;
    }

    .tracking-page {
      padding: 0 24px;
    }

    .tracking-page p {
      font-size: 16px;
      line-height: 1.8;
    }

    .tracking-box {
      padding: 24px;
    }
  }
</style>
{% endblock %}

{% block content %}

<h1 class="page-title">Track Order</h1>

<section class="tracking-page">
  <p>
    ENTER YOUR ORDER NUMBER BELOW TO VIEW THE LATEST STATUS OF YOUR ORDER.
  </p>

  <form class="tracking-box" method="GET" action="{% url 'tracking_result' %}">
    <input
      type="text"
      name="order"
      placeholder="ENTER ORDER NUMBER"
      required
    >

    <button type="submit">Track Order</button>
  </form>
</section>

{% endblock %}
