{% extends 'store/base.html' %}

{% block title %}Track Order | SLICKBACK{% endblock %}

{% block extra_css %}
<style>
.tracking-page {
  max-width: 700px;
  margin: 0 auto;
  padding: 70px 24px 110px;
  text-align: center;
}

.tracking-page h1 {
  font-family: 'Times New Roman', serif;
  font-size: 46px;
  margin-bottom: 18px;
  text-transform: uppercase;
  letter-spacing: 2px;
}

.tracking-page p {
  font-size: 14px;
  line-height: 1.8;
  color: #444;
  margin-bottom: 35px;
}

.tracking-box {
  background: #fff;
  border: 1px solid #ddd;
  padding: 35px;
}

.tracking-box input {
  width: 100%;
  padding: 15px;
  border: 1px solid #bbb;
  font-family: 'Courier New', monospace;
  font-size: 14px;
  margin-bottom: 18px;
  text-transform: uppercase;
}

.tracking-box button {
  width: 100%;
  padding: 15px;
  background: #000;
  color: #fff;
  border: none;
  font-family: 'Courier New', monospace;
  font-size: 14px;
  cursor: pointer;
  text-transform: uppercase;
}

.tracking-box button:hover {
  opacity: 0.85;
}

@media (max-width: 480px) {
  .tracking-page {
    padding: 45px 18px 90px;
  }

  .tracking-page h1 {
    font-size: 32px;
  }

  .tracking-box {
    padding: 24px;
  }
}
</style>
{% endblock %}

{% block content %}
<section class="tracking-page">
  <h1>Track Order</h1>

  <p>
    Enter your order number below to view the latest status of your order.
  </p>

  <form class="tracking-box" method="GET" action="{% url 'tracking_result' %}">
    <input 
      type="text" 
      name="order" 
      placeholder="ENTER ORDER NUMBER"
      required
    >

    <button type="submit">Track Order</button>
  </form>
</section>
{% endblock %}
