{% block extra_css %}
<style>
  .page-title {
    text-align: center;
    font-family: 'Courier New', monospace;
    font-size: 36px;
    margin: 30px 0 60px;
    text-transform: uppercase;
    letter-spacing: 2px;
    line-height: 1.2;
  }

  .contact-container {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 40px;
    text-align: center;
  }

  .contact-container p {
    font-family: 'Courier New', monospace;
    font-size: 18px;
    line-height: 1.8;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .contact-container a {
    color: black;
    text-decoration: underline;
    word-break: break-word;
  }

  @media (max-width: 768px) {
    .page-title {
      font-size: 24px;
      margin: 20px 0 40px;
      letter-spacing: 1px;
      padding: 0 16px;
    }

    .contact-container {
      padding: 0 24px;
    }

    .contact-container p {
      font-size: 16px;
      line-height: 1.8;
    }
  }
</style>
{% endblock %}
